<!DOCTYPE html>
<html>

<head>
    <title>Website.com</title>
    <link rel="stylesheet" href="Homepage.css">
</head>

<body>
    <header>
        <div id="browsecontainer">
            Pages:
            <span id="rghtarrow">&#9654;</span>
            <span id="dwnarrow">&#9660;</span>
            <div id="browsebuttonscontainer">
                <button class="browsebuttons" onclick="TakeToSecondPage()">How to use git</button>
                <button class="browsebuttons">How to install git</button>
                <button class="browsebuttons">Help with git</button>
            </div>
        </div>

    <div id="cookies">
        <h2>
            This site uses cookies.
        </h2>
        <p>
            {cookie text}
        </p>
        <button id="acceptcookiesbutton" onclick="HideCookies()">
            Accept
        </button>
        <button id="declinecookiesbutton" onclick="HideCookies()">
            Decline
        </button>
    </div>
    <script src="Homepage.js"></script>
</body>

</html>
