<!DOCTYPE html>
<html>

<head>
    <title>Website.com</title>
    <link rel="stylesheet" href="Homepage.css">
</head>

<body>
    <header>
        <div id="browsecontainer">
            <button id="browsebutton">
                <div id="browsebuttonscontainer">
                    <button class="browsebuttons" onclick="TakeToSecondPage()">First page</button>
                    <button class="browsebuttons">Second page</button>
                    <button class="browsebuttons">Third page</button>
                </div>
            </button>
        </div>
    </header>
    <div id="cookies">
        <h2>
            This site uses cookies.
        </h2>
        <p>
            {cookie text}
        </p>
        <button id="acceptcookiesbutton" onclick="HideCookies()">
            Accept
        </button>
        <button id="declinecookiesbutton" onclick="DeclineCookies()">
            Decline
        </button>
    </div>
    <script src="Homepage.js"></script>
</body>

</html>
